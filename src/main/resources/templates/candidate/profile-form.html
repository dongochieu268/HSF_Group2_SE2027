<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout/base :: head('Hồ sơ của tôi')}"></head>
<body>
<header th:replace="~{layout/base :: header}"></header>
<main class="container page-content">
    <div class="page-heading"><p class="eyebrow">Candidate profile</p>
        <h1>Hồ sơ của tôi</h1>
        <p>Cập nhật thông tin nghề nghiệp và kỹ năng.</p></div>
    <div class="alert alert-success" th:if="${param.updated != null}">Đã cập nhật hồ sơ.</div>
    <form class="form-panel form-panel-wide" th:action="@{/candidates/me}" th:object="${candidateProfileForm}"
          method="post">
        <div class="alert alert-error" th:if="${#fields.hasGlobalErrors()}"><p th:each="e:${#fields.globalErrors()}"
                                                                               th:text="${e}"></p></div>
        <div class="form-grid">
            <div class="form-group"><label>Họ tên</label><input class="form-control" th:field="*{name}"><span
                    class="field-error" th:errors="*{name}"></span></div>
            <div class="form-group"><label>Email</label><input class="form-control" type="email"
                                                               th:field="*{email}"><span class="field-error"
                                                                                         th:errors="*{email}"></span>
            </div>
            <div class="form-group"><label>Điện thoại</label><input class="form-control" th:field="*{phone}"></div>
            <div class="form-group"><label>Số năm kinh nghiệm</label><input class="form-control" type="number" min="0"
                                                                            th:field="*{yearsOfExperience}"></div>
            <div class="form-group"><label>Học vấn</label><input class="form-control" th:field="*{educationLevel}">
            </div>
            <div class="form-group"><label>Vị trí hiện tại</label><input class="form-control"
                                                                         th:field="*{currentTitle}"></div>
            <div class="form-group form-grid-full"><label>LinkedIn</label><input class="form-control"
                                                                                 th:field="*{linkedinUrl}"></div>
            <div class="form-group form-grid-full"><label>Giới thiệu</label><textarea class="form-control" rows="5"
                                                                                      th:field="*{resumeSummary}"></textarea>
            </div>
            <fieldset class="form-group form-grid-full skill-picker">
                <legend>Kỹ năng</legend>
                <label th:each="s:${skills}"><input type="checkbox" th:field="*{skillIds}" th:value="${s.id}"> <span
                        th:text="${s.name}"></span></label></fieldset>
        </div>
        <button class="button" type="submit">Lưu hồ sơ</button>
    </form>
</main>
<footer th:replace="~{layout/base :: footer}"></footer>
</body>
</html>
