<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout/base :: head('Ứng tuyển')}"></head>
<body>
<header th:replace="~{layout/base :: header}"></header>
<main class="container page-content">
    <div class="page-heading">
        <p class="eyebrow" th:text="${job.company.name}"></p>
        <h1>Ứng tuyển: <span th:text="${job.title}"></span></h1>
        <p>
            <span th:text="${job.department}"></span>
            <span> - </span>
            <span th:text="${job.location}"></span>
        </p>
    </div>

    <section class="detail-panel">
        <div class="alert alert-error" th:if="${errorMessage}" th:text="${errorMessage}"></div>

        <form method="post" th:action="@{/jobs/{id}/apply(id=${job.id})}">
            <div class="form-group">
                <label for="coverLetter">Thư giới thiệu (không bắt buộc)</label>
                <textarea class="form-control" id="coverLetter" name="coverLetter" rows="8"
                          maxlength="3000"
                          placeholder="Giới thiệu ngắn gọn về bản thân và lý do bạn phù hợp với vị trí này..."
                          th:text="${coverLetter}"></textarea>
            </div>
            <div class="actions">
                <button class="button button-primary" type="submit">Nộp đơn ứng tuyển</button>
                <a class="button button-secondary" th:href="@{/jobs/{id}(id=${job.id})}">Hủy</a>
            </div>
        </form>
    </section>
</main>
<footer th:replace="~{layout/base :: footer}"></footer>
</body>
</html>
