<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout/base :: head('Đổi mật khẩu')}"></head>
<body>
<header th:replace="~{layout/base :: header}"></header>
<main class="container page-content">
    <div class="page-heading"><p class="eyebrow">Tài khoản</p><h1>Đổi mật khẩu</h1><p>Nhập mật khẩu hiện tại để xác nhận trước khi đặt mật khẩu mới.</p></div>
    <form class="form-panel" th:action="@{/profile/password}" th:object="${changePasswordForm}" method="post">
        <div class="alert alert-error" th:if="${passwordError}" th:text="${passwordError}"></div>
        <div class="form-group">
            <label for="currentPassword">Mật khẩu hiện tại</label>
            <input class="form-control" id="currentPassword" type="password" th:field="*{currentPassword}" autocomplete="current-password">
            <span class="field-error" th:errors="*{currentPassword}"></span>
        </div>
        <div class="form-group">
            <label for="newPassword">Mật khẩu mới</label>
            <input class="form-control" id="newPassword" type="password" th:field="*{newPassword}" autocomplete="new-password">
            <p class="muted">Ít nhất 6 ký tự.</p>
            <span class="field-error" th:errors="*{newPassword}"></span>
        </div>
        <div class="form-group">
            <label for="confirmNewPassword">Xác nhận mật khẩu mới</label>
            <input class="form-control" id="confirmNewPassword" type="password" th:field="*{confirmNewPassword}" autocomplete="new-password">
            <span class="field-error" th:errors="*{confirmNewPassword}"></span>
        </div>
        <button class="button" type="submit">Đổi mật khẩu</button>
        <a class="button button-secondary" th:href="@{/profile}">Hủy</a>
    </form>
</main>
<footer th:replace="~{layout/base :: footer}"></footer>
</body>
</html>
