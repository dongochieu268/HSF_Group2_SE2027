<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout/base :: head('Doi mat khau')}"></head>
<body>
<header th:replace="~{layout/base :: header}"></header>
<main class="container page-content">
    <div class="page-heading">
        <p class="eyebrow">T&#224;i kho&#7843;n</p>
        <h1>&#272;&#7893;i m&#7853;t kh&#7849;u</h1>
        <p>C&#7853;p nh&#7853;t m&#7853;t kh&#7849;u &#273;&#259;ng nh&#7853;p cho t&#224;i kho&#7843;n c&#7911;a b&#7841;n.</p>
    </div>
    <form class="form-panel" th:action="@{/profile/password}" th:object="${changePasswordForm}" method="post">
        <div class="alert alert-error" th:if="${passwordError}" th:text="${passwordError}"></div>

        <div class="form-group">
            <label for="currentPassword">M&#7853;t kh&#7849;u hi&#7879;n t&#7841;i</label>
            <div class="password-input-row">
                <input class="form-control" id="currentPassword" type="password" th:field="*{currentPassword}" autocomplete="current-password">
                <button class="password-toggle" type="button" data-password-toggle="currentPassword" aria-controls="currentPassword" aria-label="Show password" aria-pressed="false">Show</button>
            </div>
            <span class="field-error" th:errors="*{currentPassword}"></span>
        </div>
        <div class="form-group">
            <label for="newPassword">M&#7853;t kh&#7849;u m&#7899;i</label>
            <div class="password-input-row">
                <input class="form-control" id="newPassword" type="password" th:field="*{newPassword}" autocomplete="new-password">
                <button class="password-toggle" type="button" data-password-toggle="newPassword" aria-controls="newPassword" aria-label="Show password" aria-pressed="false">Show</button>
            </div>
            <span class="field-error" th:errors="*{newPassword}"></span>
        </div>
        <div class="form-group">
            <label for="confirmNewPassword">X&#225;c nh&#7853;n m&#7853;t kh&#7849;u m&#7899;i</label>
            <div class="password-input-row">
                <input class="form-control" id="confirmNewPassword" type="password" th:field="*{confirmNewPassword}" autocomplete="new-password">
                <button class="password-toggle" type="button" data-password-toggle="confirmNewPassword" aria-controls="confirmNewPassword" aria-label="Show password" aria-pressed="false">Show</button>
            </div>
            <span class="field-error" th:errors="*{confirmNewPassword}"></span>
        </div>

        <button class="button" type="submit">L&#432;u m&#7853;t kh&#7849;u</button>
        <a class="button button-secondary" th:href="@{/profile}">H&#7911;y</a>
    </form>
</main>
<footer th:replace="~{layout/base :: footer}"></footer>
</body>
</html>
