<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout/base :: head('Đăng nhập')}"></head>
<body>
<header th:replace="~{layout/base :: header}"></header>
<main class="container page-content">
    <div class="page-heading"><p class="eyebrow">Tài khoản</p><h1>Đăng nhập</h1><p>Đăng nhập bằng tài khoản đã đăng ký.</p></div>
    <form class="form-panel" th:action="@{/auth/login}" th:object="${loginForm}" method="post">
        <input type="hidden" name="redirect" th:if="${redirectTo != null}" th:value="${redirectTo}">
        <div class="alert alert-success" th:if="${param.registered != null}">Đăng ký thành công. Bạn có thể đăng nhập.</div>
        <div class="alert alert-success" th:if="${param.logout != null}">Bạn đã đăng xuất.</div>
        <div class="alert alert-success" th:if="${param.reset != null}">Password updated - please sign in with your new password.</div>
        <div class="alert alert-error" th:if="${loginError}" th:text="${loginError}"></div>
        <div class="form-group">
            <label for="username">Tên đăng nhập</label>
            <input class="form-control" id="username" type="text" th:field="*{username}" autocomplete="username">
            <span class="field-error" th:errors="*{username}"></span>
        </div>
        <div class="form-group">
            <label for="password">Mật khẩu</label>
            <div class="password-input-row">
                <input class="form-control" id="password" type="password" th:field="*{password}" autocomplete="current-password">
                <button class="password-toggle" type="button" data-password-toggle="password" aria-controls="password" aria-label="Show password" aria-pressed="false">Show</button>
            </div>
            <span class="field-error" th:errors="*{password}"></span>
        </div>
        <div class="form-group">
            <a class="text-link" th:href="@{/auth/password-reset/request}">Forgot password?</a>
        </div>
        <button class="button" type="submit">Đăng nhập</button>
        <a class="button button-secondary" th:href="@{/auth/register}">Tạo tài khoản</a>
    </form>
</main>
<footer th:replace="~{layout/base :: footer}"></footer>
</body>
</html>
