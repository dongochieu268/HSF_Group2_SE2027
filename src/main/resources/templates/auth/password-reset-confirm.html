<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout/base :: head('Set your new password')}"></head>
<body>
<header th:replace="~{layout/base :: header}"></header>
<main class="container page-content">
    <div class="page-heading">
        <p class="eyebrow">Account</p>
        <h1 th:text="${tokenUsable} ? 'Set your new password' : 'Reset link unavailable'">Set your new password</h1>
        <p th:if="${tokenUsable}">Choose a new password for your account.</p>
    </div>
    <form class="form-panel" th:if="${tokenUsable}" th:action="@{/auth/password-reset/confirm}"
          th:object="${passwordResetConfirmForm}" method="post">
        <input type="hidden" th:field="*{token}">
        <div class="form-group">
            <label for="newPassword">New password</label>
            <input class="form-control" id="newPassword" type="password" th:field="*{newPassword}" autocomplete="new-password">
            <span class="field-error" th:errors="*{newPassword}"></span>
        </div>
        <div class="form-group">
            <label for="confirmPassword">Confirm password</label>
            <input class="form-control" id="confirmPassword" type="password" th:field="*{confirmPassword}" autocomplete="new-password">
            <span class="field-error" th:errors="*{confirmPassword}"></span>
        </div>
        <button class="button" type="submit">Set Password</button>
    </form>
    <div class="form-panel" th:unless="${tokenUsable}">
        <div class="alert alert-error">This link has expired or has already been used. Request a new reset link.</div>
        <a class="button" th:href="@{/auth/password-reset/request}">Request a new reset link</a>
        <a class="button button-secondary" th:href="@{/auth/login}">Back to Sign In</a>
    </div>
</main>
<footer th:replace="~{layout/base :: footer}"></footer>
</body>
</html>
