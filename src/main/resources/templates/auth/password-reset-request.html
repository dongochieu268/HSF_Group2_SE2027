<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout/base :: head('Reset your password')}"></head>
<body>
<header th:replace="~{layout/base :: header}"></header>
<main class="container page-content">
    <div class="page-heading">
        <p class="eyebrow">Account</p>
        <h1>Reset your password</h1>
        <p>Enter your account email address and we will send a local reset link.</p>
    </div>
    <form class="form-panel" th:action="@{/auth/password-reset/request}" th:object="${passwordResetRequestForm}" method="post">
        <div class="alert alert-success" th:if="${resetRequestSuccess}" th:text="${resetRequestSuccess}"></div>
        <div class="form-group">
            <label for="email">Email</label>
            <input class="form-control" id="email" type="email" th:field="*{email}" autocomplete="email" required>
            <span class="field-error" th:errors="*{email}"></span>
        </div>
        <button class="button" type="submit">Send Reset Link</button>
        <a class="button button-secondary" th:href="@{/auth/login}">Back to Sign In</a>
    </form>
</main>
<footer th:replace="~{layout/base :: footer}"></footer>
</body>
</html>
