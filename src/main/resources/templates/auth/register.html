<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout/base :: head('Đăng ký')}"></head>
<body>
<header th:replace="~{layout/base :: header}"></header>
<main class="container page-content">
    <div class="page-heading"><p class="eyebrow">Tài khoản</p><h1>Đăng ký</h1><p>Tài khoản mới được gán vai trò CANDIDATE.</p></div>
    <form class="form-panel" th:action="@{/auth/register}" th:object="${registerForm}" method="post">
        <div class="alert alert-error" th:if="${registrationError}" th:text="${registrationError}"></div>
        <div class="form-group"><label for="fullName">Họ và tên</label><input class="form-control" id="fullName" th:field="*{fullName}"><span class="field-error" th:errors="*{fullName}"></span></div>
        <div class="form-group"><label for="username">Tên đăng nhập</label><input class="form-control" id="username" th:field="*{username}" autocomplete="username"><span class="field-error" th:errors="*{username}"></span></div>
        <div class="form-group"><label for="email">Email</label><input class="form-control" id="email" type="email" th:field="*{email}" autocomplete="email"><span class="field-error" th:errors="*{email}"></span></div>
        <div class="form-group"><label for="password">Mật khẩu</label><input class="form-control" id="password" type="password" th:field="*{password}" autocomplete="new-password"><span class="field-error" th:errors="*{password}"></span></div>
        <button class="button" type="submit">Đăng ký</button>
        <a class="button button-secondary" th:href="@{/auth/login}">Quay lại đăng nhập</a>
    </form>
</main>
<footer th:replace="~{layout/base :: footer}"></footer>
</body>
</html>
