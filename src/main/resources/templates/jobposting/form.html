<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout/base :: head(${editMode ? 'Edit Job Posting' : 'Create Job Posting'})}"></head>
<body>
<header th:replace="~{layout/base :: header}"></header>

<main class="container page-content">
    <div class="page-heading">
        <p class="eyebrow">Job posting</p>
        <h1 th:text="${editMode ? 'Edit Job Posting' : 'Create Job Posting'}"></h1>
    </div>

    <!-- Thông báo nếu trạng thái là CLOSED -->
    <div class="alert alert-info" th:if="${jobStatus == 'CLOSED'}" style="margin-bottom: 20px; background: #e0f2fe; color: #075985; border: 1px solid #bae6fd;">
        Closed job postings cannot be edited.
    </div>

    <form class="form-panel form-panel-wide" th:action="${editMode} ? @{/jobs/{id}/edit(id=${jobId})} : @{/jobs}"
          th:object="${jobPostingForm}" method="post">

        <div class="alert alert-error" th:if="${#fields.hasGlobalErrors()}">
            <p th:each="e : ${#fields.globalErrors()}" th:text="${e}"></p>
        </div>

        <!-- Bọc toàn bộ fields trong fieldset để dễ dàng disable khi Job đã CLOSED -->
        <fieldset th:disabled="${jobStatus == 'CLOSED'}" style="border: none; padding: 0; margin: 0;">
            <div class="form-grid">
                <div class="form-group form-grid-full">
                    <label>Tiêu đề</label>
                    <input class="form-control" th:field="*{title}">
                    <span class="field-error" th:if="${#fields.hasErrors('title')}" th:errors="*{title}"></span>
                </div>

                <div class="form-group">
                    <label>Công ty</label>
                    <select class="form-control" th:field="*{companyId}">
                        <option value="">-- Chọn công ty --</option>
                        <option th:each="c:${companies}" th:value="${c.id}" th:text="${c.name}"></option>
                    </select>
                    <span class="field-error" th:if="${#fields.hasErrors('companyId')}" th:errors="*{companyId}"></span>
                </div>

                <div class="form-group">
                    <label>Loại công việc</label>
                    <select class="form-control" th:field="*{jobType}">
                        <option value="">-- Chọn loại --</option>
                        <option th:each="t:${jobTypes}" th:value="${t.name()}" th:text="${t.name()}"></option>
                    </select>
                    <span class="field-error" th:if="${#fields.hasErrors('jobType')}" th:errors="*{jobType}"></span>
                </div>

                <div class="form-group">
                    <label>Địa điểm</label>
                    <input class="form-control" th:field="*{location}">
                </div>

                <div class="form-group">
                    <label>Hạn nộp</label>
                    <input class="form-control" type="date" th:field="*{deadline}">
                    <span class="field-error" th:if="${#fields.hasErrors('deadline')}" th:errors="*{deadline}"></span>
                </div>

                <div class="form-group">
                    <label>Lương tối thiểu</label>
                    <input class="form-control" type="number" step="0.01" min="0" th:field="*{salaryMin}">
                    <span class="field-error" th:if="${#fields.hasErrors('salaryMin')}" th:errors="*{salaryMin}"></span>
                </div>

                <div class="form-group">
                    <label>Lương tối đa</label>
                    <input class="form-control" type="number" step="0.01" min="0" th:field="*{salaryMax}">
                    <span class="field-error" th:if="${#fields.hasErrors('salaryMax')}" th:errors="*{salaryMax}"></span>
                </div>

                <div class="form-group form-grid-full">
                    <label>Mô tả</label>
                    <textarea class="form-control" rows="6" th:field="*{description}"></textarea>
                    <span class="field-error" th:if="${#fields.hasErrors('description')}" th:errors="*{description}"></span>
                </div>

                <fieldset class="form-group form-grid-full skill-picker">
                    <legend>Kỹ năng yêu cầu</legend>
                    <label th:each="s:${skills}">
                        <input type="checkbox" th:field="*{skillIds}" th:value="${s.id}">
                        <span th:text="${s.name}"></span>
                    </label>
                </fieldset>
            </div>
        </fieldset>

        <div class="actions" style="margin-top: 16px;">
            <th:block th:if="${jobStatus != 'CLOSED'}">
                <!-- Nút Save As Draft -->
                <button class="button" type="submit" name="action" value="draft"
                        th:if="${!editMode or jobStatus == 'DRAFT'}">Save as Draft</button>

                <!-- Nút Publish (Chỉ hiện khi Edit tin DRAFT) -->
                <button class="button button-secondary" type="submit" name="action" value="publish"
                        th:if="${editMode and jobStatus == 'DRAFT'}"
                        onclick="return confirm('Publish this job posting?')">Publish</button>

                <!-- Nút Save Changes (Hiện khi Edit tin ACTIVE/OPEN) -->
                <button class="button" type="submit" name="action" value="save"
                        th:if="${editMode and (jobStatus == 'OPEN' or jobStatus == 'ACTIVE')}">Save Changes</button>
            </th:block>

            <a class="button button-secondary" th:href="${editMode} ? @{/jobs/{id}(id=${jobId})} : @{/jobs}">Cancel</a>
        </div>
    </form>
</main>

<footer th:replace="~{layout/base :: footer}"></footer>
</body>
</html>
