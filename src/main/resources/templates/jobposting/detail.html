<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout/base :: head('Chi tiết công việc')}"></head>
<body>
<header th:replace="~{layout/base :: header}"></header>
<main class="container page-content">
    <div class="page-heading">
        <p class="eyebrow" th:text="${job.department}"></p>
        <h1 th:text="${job.title}"></h1>
        <p>
            <span th:text="${job.company.name}"></span>
            <span> - </span>
            <span th:text="${job.location}"></span>
        </p>
    </div>
    <section class="detail-panel">
        <dl class="detail-grid">
            <div>
                <dt>Công ty</dt>
                <dd th:text="${job.company.name}"></dd>
            </div>
            <div>
                <dt>Phòng ban</dt>
                <dd th:text="${job.department}"></dd>
            </div>
            <div>
                <dt>Địa điểm</dt>
                <dd th:text="${job.location}"></dd>
            </div>
            <div>
                <dt>Loại hình công việc</dt>
                <dd th:text="${job.jobType}"></dd>
            </div>
            <div>
                <dt>Mức lương</dt>
                <dd th:text="${job.salaryRange ?: '-'}"></dd>
            </div>
            <div>
                <dt>Hạn nộp</dt>
                <dd th:text="${job.deadline ?: '-'}"></dd>
            </div>
        </dl>
        <div class="read-block">
            <h3>Mô tả công việc</h3>
            <p th:text="${job.description}"></p>
        </div>
        <div class="read-block">
            <h3>Yêu cầu công việc</h3>
            <p th:text="${job.requirements ?: '-'}"></p>
        </div>
        <div class="read-block">
            <h3>Kỹ năng yêu cầu</h3>
            <p class="muted" th:if="${#sets.isEmpty(job.requiredSkills)}">Chưa có kỹ năng yêu cầu nào được thêm.</p>
            <span class="badge skill-badge" th:each="s : ${job.requiredSkills}" th:text="${s.name}"></span>
        </div>
    </section>
    <a class="text-link" th:href="@{/jobs}">Quay lại danh sách việc làm</a>
</main>
<footer th:replace="~{layout/base :: footer}"></footer>
</body>
</html>
