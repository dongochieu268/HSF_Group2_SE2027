<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout/base :: head('Việc làm')}"></head>
<body>
<header th:replace="~{layout/base :: header}"></header>
<main class="container page-content">
    <div class="page-heading heading-row">
        <div>
            <p class="eyebrow">Vị trí đang tuyển</p>
            <h1>Vị trí đang tuyển</h1>
            <p>Tìm việc làm đang mở theo tên vị trí, phòng ban, công ty và địa điểm.</p>
        </div>
        <a class="button"
           th:if="${session.loggedInUser != null and (session.loggedInUser.roleName == 'ADMIN' or session.loggedInUser.roleName == 'HR_MANAGER')}"
           th:href="@{/manage/jobs/new}">Tạo tin tuyển dụng</a>
    </div>
    <form class="search-row" th:action="@{/jobs}" method="get">
        <input class="form-control" name="keyword" th:value="${keyword}" placeholder="Tìm theo tên vị trí">
        <button class="button" type="submit">Tìm kiếm</button>
    </form>
    <div class="table-wrap">
        <table>
            <thead>
            <tr>
                <th>Vị trí</th>
                <th>Công ty</th>
                <th>Phòng ban</th>
                <th>Địa điểm</th>
                <th>Mức lương</th>
                <th></th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="job : ${jobs}">
                <td><strong th:text="${job.title}"></strong></td>
                <td th:text="${job.company.name}"></td>
                <td><span class="badge" th:text="${job.department}"></span></td>
                <td th:text="${job.location}"></td>
                <td th:text="${job.salaryRange ?: '-'}"></td>
                <td><a class="button button-secondary button-small" th:href="@{/jobs/{id}(id=${job.id})}">Xem chi tiết</a></td>
            </tr>
            <tr th:if="${#lists.isEmpty(jobs)}">
                <td colspan="6" class="empty-cell">Không có tin tuyển dụng nào phù hợp với tìm kiếm của bạn.</td>
            </tr>
            </tbody>
        </table>
    </div>
</main>
<footer th:replace="~{layout/base :: footer}"></footer>
</body>
</html>
