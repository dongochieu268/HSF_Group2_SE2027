<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout/base :: head('Jobs')}"></head>
<body>
<header th:replace="~{layout/base :: header}"></header>
<main class="container page-content">
    <div class="page-heading heading-row">
        <div>
            <p class="eyebrow">Open positions</p>
            <h1>Open Positions</h1>
            <p>Browse active job postings by title, department, company, and location.</p>
        </div>
        <a class="button"
           th:if="${session.loggedInUser != null and (session.loggedInUser.roleName == 'ADMIN' or session.loggedInUser.roleName == 'HR_MANAGER')}"
           th:href="@{/manage/jobs/new}">Create job</a>
    </div>
    <form class="search-row" th:action="@{/jobs}" method="get">
        <input class="form-control" name="keyword" th:value="${keyword}" placeholder="Search by title">
        <button class="button" type="submit">Search</button>
    </form>
    <div class="table-wrap">
        <table>
            <thead>
            <tr>
                <th>Position</th>
                <th>Company</th>
                <th>Department</th>
                <th>Location</th>
                <th>Salary range</th>
                <th></th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="job : ${jobs}">
                <td><strong th:text="${job.title}"></strong></td>
                <td th:text="${job.company.name}"></td>
                <td><span class="badge" th:text="${job.department}"></span></td>
                <td th:text="${job.location}"></td>
                <td th:text="${job.salaryRange ?: '-'}"></td>
                <td><a class="button button-secondary button-small" th:href="@{/jobs/{id}(id=${job.id})}">Details</a></td>
            </tr>
            <tr th:if="${#lists.isEmpty(jobs)}">
                <td colspan="6" class="empty-cell">No active job postings match your search.</td>
            </tr>
            </tbody>
        </table>
    </div>
</main>
<footer th:replace="~{layout/base :: footer}"></footer>
</body>
</html>
