<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout/base :: head('Đánh giá phỏng vấn')}"></head>
<body>
<header th:replace="~{layout/base :: header}"></header>
<main class="container page-content">
    <nav class="breadcrumb" aria-label="Breadcrumb">
        <a th:href="@{/manage/applications/{id}(id=${interview.application.id})}">Application Detail</a>
        <span>/</span>
        <span>Đánh giá</span>
    </nav>

    <div class="page-heading">
        <h1 th:text="${interview.application.candidate.name}"></h1>
        <p>
            <span th:text="${interview.application.jobPosting.title}"></span>
            <span> · </span>
            <span th:text="${#temporals.format(interview.scheduledAt, 'dd/MM/yyyy HH:mm')}"></span>
            <span> · </span>
            <span th:text="${interview.interviewType}"></span>
        </p>
    </div>

    <section class="detail-panel">
        <p class="form-error" th:if="${errorMessage}" th:text="${errorMessage}"></p>

        <!-- SCR-19: {Evaluation already submitted} thay form bằng view read-only -->
        <div th:if="${existingEvaluation != null}">
            <p><strong>Đã nộp đánh giá:</strong></p>
            <span class="rating-stars">
                <span th:each="i : ${#numbers.sequence(1, 5)}"
                      th:text="${i <= existingEvaluation.rating} ? '★' : '☆'"></span>
            </span>
            <p th:text="${existingEvaluation.feedback}"></p>
            <p class="muted" th:text="${'Bạn đã nộp đánh giá này lúc ' + #temporals.format(existingEvaluation.submittedAt, 'dd/MM/yyyy HH:mm')}"></p>
            <a class="button button-secondary" th:href="@{/manage/applications/{id}(id=${interview.application.id})}">Quay lại chi tiết ứng tuyển</a>
        </div>

        <form th:if="${existingEvaluation == null}"
              th:action="@{/interviews/{id}/evaluate(id=${interview.id})}" method="post">
            <div class="form-group">
                <label id="ratingLabel">Điểm đánh giá (1-5 sao)</label>
                <div class="star-rating" role="radiogroup" aria-labelledby="ratingLabel">
                    <input type="radio" id="star5" name="rating" value="5" required>
                    <label for="star5" title="5 - Xuất sắc">★</label>
                    <input type="radio" id="star4" name="rating" value="4" required>
                    <label for="star4" title="4 - Khá">★</label>
                    <input type="radio" id="star3" name="rating" value="3" required>
                    <label for="star3" title="3 - Đạt">★</label>
                    <input type="radio" id="star2" name="rating" value="2" required>
                    <label for="star2" title="2 - Yếu">★</label>
                    <input type="radio" id="star1" name="rating" value="1" required>
                    <label for="star1" title="1 - Không đạt">★</label>
                </div>
            </div>
            <div class="form-group form-grid-full">
                <label for="feedback">Nhận xét chi tiết</label>
                <textarea class="form-control" id="feedback" name="feedback" rows="5" required></textarea>
            </div>
            <p class="muted">Once submitted, your evaluation cannot be edited or withdrawn.</p>
            <div class="actions">
                <button class="button" type="submit">Nộp đánh giá</button>
                <a class="button button-secondary" th:href="@{/manage/applications/{id}(id=${interview.application.id})}">Hủy</a>
            </div>
        </form>
    </section>
</main>
<footer th:replace="~{layout/base :: footer}"></footer>
</body>
</html>
