<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout/base :: head('Change Password')}"></head>
<body>
<header th:replace="~{layout/base :: header}"></header>

<main class="container page-content">
    <div class="page-heading">
        <h1>Change Password</h1>
    </div>

    <!-- Theo PDF, độ rộng tối đa áp dụng chung của form là form-panel -->
    <form class="form-panel" th:action="@{/profile/change-password}" th:object="${passwordForm}" method="post">

        <div class="form-group">
            <label for="currentPassword">Current password</label>
            <input class="form-control" id="currentPassword" type="password" th:field="*{currentPassword}">
            <!-- Inline error -->
            <span class="field-error" th:if="${#fields.hasErrors('currentPassword')}" th:errors="*{currentPassword}"></span>
        </div>

        <div class="form-group">
            <label for="newPassword">New password</label>
            <input class="form-control" id="newPassword" type="password" th:field="*{newPassword}">
            <!-- Helper text theo SCR-05/SCR-03 -->
            <small class="muted" style="display: block; margin-top: 4px;">At least 8 characters, including 1 uppercase letter and 1 number</small>
            <!-- Inline error -->
            <span class="field-error" th:if="${#fields.hasErrors('newPassword')}" th:errors="*{newPassword}"></span>
        </div>

        <div class="form-group">
            <label for="confirmPassword">Confirm new password</label>
            <input class="form-control" id="confirmPassword" type="password" th:field="*{confirmPassword}">
            <!-- Inline error -->
            <span class="field-error" th:if="${#fields.hasErrors('confirmPassword')}" th:errors="*{confirmPassword}"></span>
        </div>

        <div class="actions" style="margin-top: 24px;">
            <button class="button" type="submit">Change Password</button>
            <a class="button button-secondary" th:href="@{/profile}">Cancel</a>
        </div>
    </form>
</main>

<footer th:replace="~{layout/base :: footer}"></footer>
</body>
</html>
