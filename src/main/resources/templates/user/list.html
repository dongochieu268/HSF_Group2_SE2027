<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout/base :: head('User Management')}"></head>
<body>
<header th:replace="~{layout/base :: header}"></header>
<main class="container page-content">
    <div class="page-heading heading-row">
        <div>
            <p class="eyebrow">Admin</p>
            <h1>User Management</h1>
            <p>Create staff accounts, review access, and manage account status.</p>
        </div>
        <a class="button" th:href="@{/admin/users/new}">Create Account</a>
    </div>

    <div class="alert alert-success" th:if="${param.created != null}">Account created successfully.</div>

    <form class="filter-bar" th:action="@{/admin/users}" method="get">
        <input class="form-control" type="search" name="q" th:value="${q}" placeholder="Search name or email">
        <select class="form-control" name="role" aria-label="Role filter">
            <option value="">All roles</option>
            <option th:each="role : ${roles}"
                    th:value="${role.name}"
                    th:selected="${role.name == selectedRole}"
                    th:text="${role.name == 'RECRUITER' ? 'HR Manager' : role.name}"></option>
        </select>
        <select class="form-control" name="status" aria-label="Status filter">
            <option value="">All statuses</option>
            <option th:each="status : ${statuses}"
                    th:value="${status.name()}"
                    th:selected="${status == selectedStatus}"
                    th:text="${#strings.capitalize(#strings.toLowerCase(status.name()))}"></option>
        </select>
        <button class="button" type="submit">Apply</button>
        <a class="button button-secondary" th:href="@{/admin/users}">Reset</a>
    </form>

    <div class="table-wrap">
        <table>
            <thead>
            <tr>
                <th>Full name</th>
                <th>Username</th>
                <th>Email</th>
                <th>Role</th>
                <th>Status</th>
                <th>Date created</th>
                <th>Actions</th>
            </tr>
            </thead>
            <tbody>
            <tr th:if="${#lists.isEmpty(users)}">
                <td class="empty-cell" colspan="7">No accounts match your filters.</td>
            </tr>
            <tr th:each="user : ${users}">
                <td><strong th:text="${user.fullName}"></strong></td>
                <td th:text="${user.username}"></td>
                <td th:text="${user.email}"></td>
                <td>
                    <span class="badge"
                          th:text="${user.role.name == 'RECRUITER' ? 'HR Manager' : user.role.name}"></span>
                </td>
                <td>
                    <span class="badge"
                          th:classappend="${user.accountStatus.name() == 'LOCKED'} ? ' badge-warning' : (${user.accountStatus.name() == 'INACTIVE'} ? ' badge-disabled' : '')"
                          th:text="${user.accountStatus.name() == 'LOCKED' ? 'Locked' : #strings.capitalize(#strings.toLowerCase(user.accountStatus.name()))}"></span>
                </td>
                <td th:text="${#temporals.format(user.createdAt, 'yyyy-MM-dd')}"></td>
                <td class="actions">
                    <form th:if="${user.accountStatus.name() == 'LOCKED'}"
                          th:action="@{/admin/users/{id}/unlock(id=${user.id})}" method="post"
                          onsubmit="return confirm('Unlock this account?')">
                        <button class="button button-secondary button-small" type="submit">Unlock</button>
                    </form>
                    <form th:if="${(user.accountStatus.name() == 'ACTIVE' or user.accountStatus.name() == 'LOCKED') and user.id != lastActiveAdminId}"
                          th:action="@{/admin/users/{id}/deactivate(id=${user.id})}" method="post"
                          onsubmit="return confirm('Deactivate this account?')">
                        <button class="button button-danger button-small" type="submit">Deactivate</button>
                    </form>
                    <button th:if="${user.accountStatus.name() == 'INACTIVE'}"
                            class="button button-secondary button-small" type="button" disabled
                            title="Not available in this version">Reactivate</button>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</main>
<footer th:replace="~{layout/base :: footer}"></footer>
</body>
</html>
